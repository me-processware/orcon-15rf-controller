; PlatformIO project — Orcon 15RF emulator (Heltec WiFi LoRa 32 V3/V4, ESP32-S3)
;
; Two firmware builds, both flashed over WiFi (OTA):
;   heltec_v3_cc1101_ota — CC1101 does RX *and* TX (the working build)
;   heltec_v3_1262_ota   — on-board SX1262 only (RX can't decode RAMSES; kept
;                          for single-board experiments)
;
; First-ever flash of a board must be over USB. To do that, add COM port:
;   pio run -e heltec_v3_cc1101_ota -t upload --upload-port COM5
; (a COM port overrides the OTA settings below and uses the USB programmer).

[platformio]
default_envs = heltec_v3_cc1101_ota

[env]
platform   = espressif32
board      = heltec_wifi_lora_32_V3
framework   = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=1
lib_deps =
    jgromes/RadioLib @ ^7.1.0
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35.19

; ---- THE WORKING BUILD: one CC1101 does both RX and TX (async serial) --------
; Wiring: SCLK=4 MOSI=2 MISO=1 CSN=7 GDO0=5 GDO2=6, Vcc=3V3, GND=GND, + ANT wire.
; OTA target = the attic board. Change upload_port if its IP changes.
[env:heltec_v3_cc1101_ota]
build_flags =
    ${env.build_flags}
    -DRADIO_CC1101_ASYNC=1
upload_protocol = espota
upload_port = 192.168.2.137

; ---- On-board SX1262 only (no external radio). Transmits; RX does NOT decode --
; RAMSES (the SX1262 packet engine can't frame it) — kept for experiments.
[env:heltec_v3_1262_ota]
build_flags =
    ${env.build_flags}
    -DRADIO_SX1262=1
upload_protocol = espota
upload_port = 192.168.2.139

; ---- Heltec WiFi LoRa 32 V2 (ESP32 + SX1276): single-board RX+TX, no CC1101 --
; The SX1276 keeps the continuous/direct FSK mode the SX1262 lacks, so RX uses
; the same async-UART decode as the CC1101 (DIO2 -> UART), TX uses packet mode.
; First flash over USB:  pio run -e heltec_v2_sx1276 -t upload --upload-port COM5
[env:heltec_v2_sx1276]
board = heltec_wifi_lora_32_V2
build_flags =
    ${env.build_flags}
    -DRADIO_SX1276=1
    -DBOARD_HELTEC_V2=1

[env:heltec_v2_sx1276_ota]
board = heltec_wifi_lora_32_V2
build_flags =
    ${env.build_flags}
    -DRADIO_SX1276=1
    -DBOARD_HELTEC_V2=1
upload_protocol = espota
upload_port = 192.168.2.140      ; <-- set to the V2 board's IP after first USB flash

; ---- Guition ESP32-4848S040 (ESP32-S3, 480x480 RGB TFT) ---------------------
; Same CC1101 async RX+TX firmware, board-specific pins (config.h BOARD_4848S040).
; CC1101 soldered directly to the ESP32 pins; shares the display/SD SPI bus.
; Headless for now (no on-screen UI yet) — control via the WiFi web UI.
; Flash over USB (CH340):  pio run -e esp32-480480s040 -t upload
[env:esp32-480480s040]
; Pin to ESP32 Arduino core 2.0.17 — Arduino_GFX's RGB panel path is tested there.
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DRADIO_CC1101_ASYNC=1
    -DBOARD_4848S040=1
    -DBOARD_HAS_PSRAM=1
lib_deps =
    ${env.lib_deps}
    ; GFX 1.4.x is the last line that builds on ESP32 core 2.0.x (1.5+ needs
    ; esp32-hal-periman.h from core 3.x). Keeps us on the pinned 6.7.0 platform.
    moononournation/GFX Library for Arduino @ ~1.4.0
    ; Adafruit GFX is added only for its Fonts/*.h headers (smooth FreeSans).
    ; We never include Adafruit_GFX.h, so it doesn't clash with Arduino_GFX.
    adafruit/Adafruit GFX Library @ ^1.11.9

; ---- GPIO mapper (diagnostic) ------------------------------------------------
; Schematic-independent pin finder. Drives each CC1101 GPIO (48,47,41,40,2,1)
; HIGH for 2.5s in turn while printing it over serial. Probe each CC1101 solder
; point with a meter to confirm which GPIO it actually lands on.
;   pio run -e pintest_4848 -t upload     (USB), then open the serial monitor.
[env:pintest_4848]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DRADIO_CC1101_ASYNC=1
    -DBOARD_4848S040=1
    -DBOARD_HAS_PSRAM=1
    -DPINTEST=1
lib_deps =
    ${env.lib_deps}
    moononournation/GFX Library for Arduino @ ~1.4.0
    adafruit/Adafruit GFX Library @ ^1.11.9

; ---- Native unit tests (host) -----------------------------------------------
; Run with:  pio test -e native   (or build test/*.cpp directly with g++)
[env:native]
platform = native
build_flags = -std=c++17 -I src
test_framework = custom
